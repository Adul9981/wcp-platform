<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界杯预测平台 · 2026</title>
<style>
:root{
  --bg:#f6f8fa;--card:#fff;--border:#d0d7de;--txt:#1f2328;--muted:#57606a;
  --gold:#9a6700;--green:#1a7f37;--blue:#0969da;--red:#d1242f;--chip:#eaeef2;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-hover:0 3px 10px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

/* ── header ── */
header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;padding:12px 20px}
.hrow1{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hrow1 h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:6px}
.hrow1 h1 span{font-size:13px;color:var(--muted);font-weight:400}
.hlinks{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hlink{font-size:13px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);color:var(--txt);white-space:nowrap;transition:.15s}
.hlink:hover{border-color:var(--blue);color:var(--blue);text-decoration:none}
.hlink.reg{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
.hlink.reg:hover{opacity:.88;color:#fff}
.hcode{font-size:13px;color:var(--muted);border:1px solid var(--border);padding:3px 9px;border-radius:6px;background:var(--chip)}
.hrow2{margin-top:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.hrow2 b{color:var(--green)}
#refreshBtn{font-size:12px;padding:3px 10px;border:1px solid var(--border);border-radius:5px;background:#fff;color:var(--blue);cursor:pointer}
#refreshBtn:hover{background:var(--chip)}

/* ── layout ── */
.wrap{max-width:1320px;margin:0 auto;padding:16px}

/* ── tabs ── */
.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:#fff;color:var(--muted);cursor:pointer;font-size:14px;white-space:nowrap;transition:.15s}
.tab:hover{border-color:var(--blue);color:var(--blue)}
.tab.active{color:#fff;background:var(--blue);border-color:var(--blue)}
@media(max-width:700px){.tab.hide-m{display:none}}

/* ── strategy panel ── */
.panel{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.panel summary{cursor:pointer;padding:11px 14px;font-size:14px;font-weight:600;list-style:none;display:flex;align-items:center;gap:6px}
.panel summary::-webkit-details-marker{display:none}
.panel summary::after{content:"▸";color:var(--muted);margin-left:auto}
.panel[open] summary::after{content:"▾"}
.strat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;padding:0 14px 14px}
.strat{font-size:12px;color:var(--muted);padding:8px 10px;background:var(--bg);border-radius:6px}
.strat b{color:var(--green);display:block;margin-bottom:2px}
.pm-note{margin:0 14px 12px;padding:10px 12px;background:#ddf4ff;border:1px solid #54aeff55;border-radius:7px;font-size:13px;color:#0550ae}

/* ── filters ── */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filters .lbl{font-size:12px;color:var(--muted)}
.fchip{font-size:12px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:.15s}
.fchip:hover{border-color:var(--blue)}
.fchip.active{color:#fff;background:var(--blue);border-color:var(--blue)}

/* ── boards ── */
.boards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.boards{grid-template-columns:1fr}}
.col h2{font-size:15px;font-weight:700;margin-bottom:10px;padding:8px 12px;border-radius:8px;background:var(--chip)}
.col.today h2{background:#ddf4ff;color:#0550ae}
.col.low_risk h2{background:#dafbe1;color:var(--green)}
.col.high_risk h2{background:#ffebe9;color:var(--red)}

/* ── cards ── */
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:10px;box-shadow:var(--shadow);transition:.15s}
.card:hover{box-shadow:var(--shadow-hover);border-color:#b1bac4}
.card .top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.card .ctitle{font-size:14px;font-weight:600;flex:1;line-height:1.4}
.rank{font-size:12px;color:var(--muted);min-width:22px}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin:7px 0}
.chip{font-size:11px;padding:2px 7px;border-radius:5px;background:var(--chip);color:var(--muted)}
.chip.s{background:#dafbe1;color:var(--green);cursor:help}
.chip.new{background:#fff8c5;color:var(--gold)}
.chip.risk-low{background:#dafbe1;color:var(--green)}
.chip.risk-high{background:#ffebe9;color:var(--red)}
.chip.risk-swing{background:#fff8c5;color:var(--gold)}
.nums{display:flex;gap:12px;font-size:12px;color:var(--muted);margin:5px 0;flex-wrap:wrap}
.nums .v{color:var(--txt);font-weight:600}
.pay{color:var(--green);font-weight:700}
.pay.hi{color:var(--gold)}
.dir{margin:7px 0;padding:8px 10px;background:#dafbe1;border:1px solid #aceebb;border-radius:7px;font-size:13px}
.dir b{color:var(--green);font-size:14px}
.dir .dprice{color:var(--green);font-weight:700;margin-left:4px}
.dir .dconf{float:right;font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:1px 7px;background:#fff}
.dir .dbasis{font-size:11px;color:var(--muted);margin-top:3px;clear:both}
.reason{font-size:12px;color:var(--muted);margin:5px 0;padding:5px 8px;background:var(--bg);border-radius:5px}
.go{display:inline-block;margin-top:6px;font-size:12px;color:var(--blue);border:1px solid var(--blue);border-radius:6px;padding:4px 10px}
.go:hover{background:#ddf4ff;text-decoration:none}
.empty-col{text-align:center;color:var(--muted);padding:30px;font-size:13px;background:#fff;border-radius:8px;border:1px dashed var(--border)}

/* ── 赛前预测 ── */
.pred-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.pred-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow)}
.pred-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.pred-match{font-size:15px;font-weight:700;flex:1}
.pred-ko{font-size:12px;color:var(--muted)}
.risk-badge{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:600}
.risk-badge.低{background:#dafbe1;color:var(--green)}
.risk-badge.中{background:#fff8c5;color:var(--gold)}
.risk-badge.高{background:#ffebe9;color:var(--red)}
.pred-dir{font-size:15px;font-weight:700;color:var(--blue);margin:6px 0;padding:8px 10px;background:#ddf4ff;border-radius:6px}
.pred-reason{font-size:13px;color:var(--muted);line-height:1.6}
.pred-result{margin-top:8px;font-size:13px;padding:5px 10px;border-radius:5px;font-weight:600}
.pred-result.won{background:#dafbe1;color:var(--green)}
.pred-result.lost{background:#ffebe9;color:var(--red)}
.pred-result.void{background:var(--chip);color:var(--muted)}
.pred-empty{text-align:center;color:var(--muted);padding:50px;font-size:14px}

/* ── progress ── */
.pbar{height:8px;background:var(--chip);border-radius:5px;overflow:hidden;margin:8px 0}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--gold))}
.stage{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.stage .dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex-shrink:0;background:var(--muted)}
.stage.done .dot{background:var(--green)}
.stage.live .dot{background:var(--gold);box-shadow:0 0 0 4px #9a670030}
.stage .sname{font-weight:600;font-size:14px}
.stage .sdate{font-size:12px;color:var(--muted)}
.stage .sdesc{font-size:12px;color:var(--muted);margin-top:3px}
.stage .stag{font-size:11px;padding:2px 8px;border-radius:5px;margin-left:auto;white-space:nowrap;font-weight:600}
.stag.done{background:#dafbe1;color:var(--green)}
.stag.live{background:#fff8c5;color:var(--gold)}
.stag.todo{background:var(--chip);color:var(--muted)}
.rtab{width:100%;border-collapse:collapse;font-size:13px}
.rtab td{padding:5px 7px;border-bottom:1px solid var(--border)}
.rtab thead td{color:var(--muted);font-size:11px;background:var(--bg)}

/* ── misc ── */
footer{padding:16px;color:var(--muted);font-size:11px;text-align:center;border-top:1px solid var(--border);margin-top:20px}
.loading{text-align:center;color:var(--muted);padding:40px}
.err{color:var(--red);text-align:center;padding:20px}
.hidden{display:none!important}
</style>
</head>
<body>

<header>
  <div class="hrow1">
    <h1>⚽ 世界杯预测平台 <span>2026</span></h1>
    <div class="hlinks">
      <a class="hlink reg" href="https://polymarket.com/?r=adul" target="_blank" rel="noopener">📝 注册 Polymarket</a>
      <span class="hcode">邀请码&nbsp;<b>adul</b></span>
      <a class="hlink" href="https://twitter.com/rich_adul" target="_blank" rel="noopener">𝕏&nbsp;@rich_adul</a>
      <a class="hlink" href="https://t.me/serene7mc" target="_blank" rel="noopener">✈️&nbsp;Telegram</a>
    </div>
  </div>
  <div class="hrow2">
    <span id="meta">加载中…</span>
    <span id="refreshInfo"></span>
    <button id="refreshBtn">立即刷新</button>
  </div>
</header>

<div class="wrap">
  <div class="tabs" id="tabs">
    <div class="tab active" data-v="all">全部三榜</div>
    <div class="tab hide-m" data-v="today">📅 今日关注</div>
    <div class="tab hide-m" data-v="low_risk">🛡️ 低风险</div>
    <div class="tab hide-m" data-v="high_risk">🎲 高风险</div>
    <div class="tab" data-v="picks">🎯 赛前预测</div>
    <div class="tab" data-v="progress">📅 赛程进度</div>
  </div>

  <!-- 三榜视图 -->
  <div id="boardsView">
    <details class="panel" id="stratPanel">
      <summary>📖 策略说明</summary>
      <div class="pm-note">💡 <b>Polymarket 支持赛中随时买卖</b>——不只是赛前。以下策略多数是赛前判断，你也可以在中场休息或比赛关键时刻入场。卖出持仓也随时可以。</div>
      <div class="strat-grid" id="stratGrid"></div>
    </details>
    <div class="filters" id="filters"></div>
    <div class="boards" id="boards"><div class="loading">加载中…</div></div>
  </div>

  <!-- 赛前预测视图 -->
  <div id="picksView" class="hidden"></div>

  <!-- 进度视图 -->
  <div id="progressView" class="hidden"></div>
</div>

<footer id="disclaimer"></footer>

<script>
const LABEL={today:"📅 今日关注",low_risk:"🛡️ 低风险",high_risk:"🎲 高风险"};
const BOARD_KEYS=["today","low_risk","high_risk"];
let DATA=null,STRAT={},view="all",fLine="all",fType="all";

function fmtNum(n){if(!n)return"0";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return Math.round(n);}
function fmtTime(s){if(!s)return"--";const d=new Date(s);return d.toLocaleString("zh-CN",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});}
function fmtDate(s){if(!s)return"--";return s.replaceAll("-","/").slice(5);}

function stratTip(code){const s=STRAT[code];return s?`策略${code}·${s.name}：${s.desc}`:`策略${code}`;}

function card(e,i){
  const tags=(e.strategy_tags||[]).map(t=>`<span class="chip s" title="${stratTip(t)}">策略${t}·${(STRAT[t]||{}).name||""}</span>`).join("");
  const isnew=e.is_new?`<span class="chip new">🆕 新上线</span>`:"";
  const pr=e.payoff_ratio;
  const payClass=pr&&pr>5?"hi":"";
  const pay=pr?`<span>盈亏比 <span class="pay ${payClass}">${pr}x</span></span>`:"";
  const price=e.price!=null?`<span>概率 <span class="v">${(e.price*100).toFixed(1)}%</span></span>`:"";
  const ko=e.kickoff?`<span>开赛 ${fmtTime(e.kickoff)}</span>`:"";
  const d=e.direction;
  const dp=d&&d.price!=null?` <span class="dprice">${(d.price*100).toFixed(0)}%</span>`:"";
  const dir=d
    ?`<div class="dir"><b>🎯 ${d.label}</b>${dp}<span class="dconf">信心${d.confidence||'-'}</span><div class="dbasis">${d.basis||''}</div></div>`
    :"";
  return `<div class="card" data-line="${e.line}" data-type="${e.bet_type||'-'}">
    <div class="top"><span class="rank">#${i+1}</span><span class="ctitle">${e.title}</span></div>
    <div class="chips"><span class="chip">${e.line}</span><span class="chip">${e.bet_type||"-"}</span>${isnew}${tags}</div>
    ${dir}
    <div class="nums">${price}${pay}<span>成交 <span class="v">${fmtNum(e.volume)}</span></span></div>
    ${ko?`<div class="nums">${ko}</div>`:""}
    <div class="reason">${e.reason||""}</div>
    <a class="go" href="${e.event_url}" target="_blank" rel="noopener">前往 Polymarket ↗</a>
  </div>`;
}

function matchFilter(e){
  if(fLine!=="all"&&e.line!==fLine)return false;
  if(fType!=="all"&&(e.bet_type||"-")!==fType)return false;
  return true;
}

function colHtml(key){
  const items=(DATA[key]||[]).filter(matchFilter);
  return `<div class="col ${key}"><h2>${LABEL[key]}</h2>${
    items.length?items.map(card).join(""):'<div class="empty-col">暂无符合条件的选题</div>'}</div>`;
}

function renderFilters(){
  const all=BOARD_KEYS.flatMap(k=>DATA[k]||[]);
  const types=[...new Set(all.map(e=>e.bet_type||"-"))];
  const lc=[["all","全部"],["单场","单场比赛"],["长盘","赛事长盘"]]
    .map(([v,t])=>`<span class="fchip ${fLine===v?'active':''}" data-f="line" data-v="${v}">${t}</span>`).join("");
  const tc=`<span class="fchip ${fType==="all"?'active':''}" data-f="type" data-v="all">全部盘口</span>`+
    types.map(t=>`<span class="fchip ${fType===t?'active':''}" data-f="type" data-v="${t}">${t}</span>`).join("");
  document.getElementById("filters").innerHTML=`<span class="lbl">类型：</span>${lc}<span class="lbl" style="margin-left:8px">盘口：</span>${tc}`;
}

function renderBoards(){
  const box=document.getElementById("boards");
  const keys=view==="all"?BOARD_KEYS:[view];
  box.style.gridTemplateColumns=view==="all"?"":"1fr";
  box.innerHTML=keys.map(colHtml).join("");
}

function renderStrategies(){
  document.getElementById("stratGrid").innerHTML=
    Object.entries(STRAT).map(([k,s])=>`<div class="strat"><b>策略${k}·${s.name}</b>${s.desc}</div>`).join("");
}

async function renderPicks(){
  const pv=document.getElementById("picksView");
  pv.innerHTML='<div class="loading">加载中…</div>';
  try{
    const d=await (await fetch("/predictions")).json();
    if(!d.predictions||!d.predictions.length){
      pv.innerHTML='<div class="pred-empty">📭 还没有赛前预测，敬请期待</div>';
      return;
    }
    const cards=d.predictions.map(p=>{
      const ko=p.kickoff?`<span class="pred-ko">${fmtTime(p.kickoff)}</span>`:"";
      const res=p.result
        ?`<div class="pred-result ${p.result==='命中'?'won':p.result==='未命中'?'lost':'void'}">${
            p.result==='命中'?'✅ 命中':p.result==='未命中'?'❌ 未命中':'— 无效'}</div>`:"";
      return `<div class="pred-card">
        <div class="pred-head">
          <span class="pred-match">${p.match}</span>
          ${ko}
          <span class="risk-badge ${p.risk_level}">${p.risk_level}风险</span>
        </div>
        <div class="pred-dir">🎯 ${p.direction}</div>
        ${p.reasoning?`<div class="pred-reason">${p.reasoning}</div>`:""}
        ${res}
      </div>`;
    }).join("");
    pv.innerHTML=`<div class="pred-grid">${cards}</div>`;
  }catch(err){pv.innerHTML=`<div class="err">加载失败：${err.message}</div>`;}
}

async function renderProgress(){
  const pv=document.getElementById("progressView");
  pv.innerHTML='<div class="loading">加载中…</div>';
  try{
    const p=await (await fetch("/progress")).json();
    const stages=p.stages.map(s=>{
      const cls=s.status==="已结束"?"done":s.status==="进行中"?"live":"";
      const tag=s.status==="已结束"?"done":s.status==="进行中"?"live":"todo";
      return `<div class="stage ${cls}"><span class="dot"></span><div>
        <div class="sname">${s.name}</div>
        <div class="sdate">${fmtDate(s.start)} — ${fmtDate(s.end)}</div>
        <div class="sdesc">${s.desc}</div></div>
        <span class="stag ${tag}">${s.status}</span></div>`;
    }).join("");
    const st=await (await fetch("/standings")).json();
    const sc=s=>s==="已出线"?"var(--green)":s==="已淘汰"?"var(--muted)":s==="小组赛中"?"var(--gold)":"var(--muted)";
    const gh=Object.entries(st.groups).map(([g,rows])=>{
      const tr=rows.map(r=>`<tr><td>${r.rank||"-"}</td><td>${r.team}${r.is_host?"🏠":""}</td>
        <td>${r.played}</td><td>${r.w}/${r.d}/${r.l}</td><td>${r.gf-r.ga>0?"+":""}${r.gf-r.ga}</td>
        <td><b>${r.pts}</b></td><td style="color:${sc(r.status)}">${r.status}</td></tr>`).join("");
      return `<div class="panel" style="padding:10px"><div style="font-weight:600;margin-bottom:6px">${g}组</div>
        <table class="rtab"><thead><tr><td>名</td><td>队</td><td>赛</td><td>W/D/L</td><td>净</td><td>分</td><td>状态</td></tr></thead>
        <tbody>${tr}</tbody></table></div>`;
    }).join("");
    pv.innerHTML=`<div class="panel" style="padding:14px;margin-bottom:14px">
      <div style="font-size:15px;font-weight:700">当前阶段：<span style="color:var(--gold)">${p.current_stage}</span>
        <span style="float:right;color:var(--muted);font-size:12px">进度 ${p.overall_percent}%</span></div>
      <div class="pbar"><i style="width:${p.overall_percent}%"></i></div></div>
      <div style="margin-bottom:14px">${stages}</div>
      <h2 style="margin-bottom:10px;font-size:15px">📊 小组积分榜</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px">${gh}</div>`;
  }catch(err){pv.innerHTML=`<div class="err">加载失败：${err.message}</div>`;}
}

function switchView(){
  const isBoards=["all","today","low_risk","high_risk"].includes(view);
  document.getElementById("boardsView").classList.toggle("hidden",!isBoards);
  document.getElementById("picksView").classList.toggle("hidden",view!=="picks");
  document.getElementById("progressView").classList.toggle("hidden",view!=="progress");
  if(view==="picks") renderPicks();
  else if(view==="progress") renderProgress();
  else renderBoards();
}

async function updateRefreshInfo(){
  try{
    const s=await (await fetch("/refresh-status")).json();
    const ok=s.last_ok?`✓ 已刷新${s.runs}次`:(s.last_error?`⚠ 上次失败`:"");
    document.getElementById("refreshInfo").textContent=`自动刷新每${s.interval_min}分钟 · ${ok}`;
  }catch(e){}
}

document.getElementById("refreshBtn").addEventListener("click",async function(){
  const b=this;b.disabled=true;b.textContent="刷新中…";
  try{await fetch("/refresh",{method:"POST"});await load();}catch(e){}
  b.disabled=false;b.textContent="立即刷新";
});

async function load(){
  try{
    [STRAT]=[await (await fetch("/strategies")).json()];
    renderStrategies();
    DATA=await (await fetch("/boards?top_n=20")).json();
    const m=DATA.meta||{};
    const s=(DATA.today[0]||DATA.low_risk[0]||DATA.high_risk[0]||{}).snapshot_ts;
    document.getElementById("meta").innerHTML=`共 <b>${m.total_topics||0}</b> 个选题 · 更新 ${fmtTime(s)}`;
    updateRefreshInfo();
    document.getElementById("disclaimer").textContent=(m.disclaimer||"")+" · 数据来源 Polymarket · 不构成投资建议";
    renderFilters();renderBoards();
  }catch(err){
    document.getElementById("boards").innerHTML=`<div class="err">数据加载失败：${err.message}</div>`;
  }
}

document.getElementById("tabs").addEventListener("click",e=>{
  if(!e.target.dataset.v)return;
  view=e.target.dataset.v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.v===view));
  switchView();
});
document.getElementById("filters").addEventListener("click",e=>{
  const f=e.target.dataset.f;if(!f)return;
  if(f==="line")fLine=e.target.dataset.v;else fType=e.target.dataset.v;
  renderFilters();renderBoards();
});
load();
</script>
</body>
</html>
